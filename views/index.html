<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Master App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="environment-badge" data-color="{{color}}">
            {{envName}} Environment
        </div>

        <div class="info">
            <p>Current environment: <strong>{{APP_ENV}}</strong></p>
            <p>Server running on port: <strong>{{PORT}}</strong></p>
        </div>
    </div>
</body>
</html>
