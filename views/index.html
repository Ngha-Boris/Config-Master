<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Master App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }
        .environment-badge {
            display: inline-block;
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .info {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="environment-badge" style="background-color: {{color}};">
            {{envName}} Environment
        </div>
        <h1>Config Master App</h1>
        <div class="info">
            <p>Current environment: <strong>{{APP_ENV}}</strong></p>
            <p>Server running on port: <strong>{{PORT}}</strong></p>
        </div>
    </div>
</body>
</html>
